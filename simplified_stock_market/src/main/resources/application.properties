# Database connection configuration
spring.application.name=simplified_stock_market
spring.datasource.url=${DB_URL:jdbc:postgresql://stock_db:5432/stock_market}
spring.datasource.username=${DB_USERNAME:stock_market_user}
spring.datasource.password=${DB_PASSWORD:stock_market_password}

